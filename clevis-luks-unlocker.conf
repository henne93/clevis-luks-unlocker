# clevis-luks-unlocker.conf
# Configuration file for clevis-luks-unlocker.sh
# Place this file in the same directory as the script.

# Path to log file
LOG=/var/log/unlock-lxc.log

# Total wall-clock timeout in seconds to wait for any Tang server to respond
TANG_TIMEOUT=60

# Seconds to sleep between full Tang server retry cycles
RETRY_INTERVAL=5

# Timeout in seconds per individual LUKS volume unlock attempt
UNLOCK_TIMEOUT=15

# Space-separated list of Tang server URLs
# The script tries each URL in order and uses the first one that responds.
TANG_URLS="https://tang1.example.com https://tang2.example.com"

# Space-separated list of LUKS volumes to unlock.
# Format: /dev/path:mapper-name
# Example: /dev/pve/lxc-100-data:lxc-100-data /dev/pve/lxc-101-data:lxc-101-data
LUKS_VOLUMES="/dev/pve/lxc-<CTID>-<NAME>:lxc-<CTID>-<NAME>"
